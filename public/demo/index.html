<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flow | WAGE Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #0b0e14;
      --bg-card: #111620;
      --border: rgba(255,255,255,0.07);
      --text: #e8eaf0;
      --muted: #9ba3af;
      --teal: #00e5b4;
      --purple: #7c3aed;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-base);
      color: var(--text);
    }

    .money,
    .mono {
      font-family: 'IBM Plex Mono', monospace;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    .tabs {
      display: flex;
      gap: 8px;
    }

    .tab {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: #cfd6e3;
      padding: 8px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease;
    }

    .tab.active {
      background: rgba(124,58,237,0.16);
      color: #e8ddff;
      border-color: rgba(124,58,237,0.45);
    }

    .panel {
      display: none;
      margin-top: 16px;
      position: relative;
    }

    .panel.active {
      display: block;
    }

    .panel.active::before {
      content: '';
      position: absolute;
      inset: -8px;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(124,58,237,0.12) 0%, transparent 70%);
    }

    .panel > * {
      position: relative;
      z-index: 1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }

    .stat-card {
      border-bottom: 2px solid rgba(0,229,180,0.55);
    }

    .stat-title {
      color: var(--muted);
      font-size: 12px;
    }

    .stat-val {
      margin-top: 8px;
      font-size: 28px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: transparent;
    }

    thead tr {
      background: rgba(255,255,255,0.03);
    }

    th {
      text-align: left;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 12px 16px;
    }

    td {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 14px;
    }

    .claimable {
      color: var(--teal);
      font-family: 'IBM Plex Mono', monospace;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .pulse-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--teal);
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .badge {
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      border: 1px solid transparent;
    }

    .badge.active {
      background: rgba(0,229,180,0.12);
      color: var(--teal);
      border-color: rgba(0,229,180,0.25);
    }

    .badge.paused {
      background: rgba(245,158,11,0.12);
      color: #f59e0b;
      border-color: rgba(245,158,11,0.25);
    }

    .btn {
      border-radius: 8px;
      padding: 6px 16px;
      background: transparent;
      cursor: pointer;
    }

    .btn-pause {
      border: 1px solid var(--teal);
      color: var(--teal);
    }

    .btn-cancel {
      border: 1px solid #ef4444;
      color: #ef4444;
    }

    .employee-wrap {
      max-width: 860px;
      margin: 0 auto;
    }

    .label {
      text-align: center;
      color: rgba(255,255,255,0.56);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .hero {
      font-size: 64px;
      line-height: 1;
      text-align: center;
      margin: 16px 0 8px;
      color: var(--teal);
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
    }

    .sub {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .fx {
      margin-top: 8px;
      text-align: center;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
    }

    .btn-withdraw {
      margin-top: 14px;
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 12px;
      background: var(--purple);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: background 160ms ease;
    }

    .btn-withdraw:hover {
      background: #6d28d9;
    }

    .btn-withdraw:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #ffffff;
      border-radius: 999px;
      animation: spin 800ms linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .flash {
      animation: flash 260ms ease;
    }

    @keyframes flash {
      0% { filter: brightness(1); }
      50% { filter: brightness(1.6); }
      100% { filter: brightness(1); }
    }

    .banner {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(16,185,129,0.16);
      color: #86efac;
      border: 1px solid rgba(16,185,129,0.3);
      display: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      text-align: center;
    }

    .banner a {
      color: #86efac;
      text-decoration: none;
    }

    .type-streamcreated { color: #00e5b4; }
    .type-withdrawn { color: #60a5fa; }
    .type-paused { color: #f59e0b; }
    .type-topup { color: #a78bfa; }
    .type-cancelled { color: #ef4444; }

    .log-row {
      animation: slideIn 260ms ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @media (max-width: 840px) {
      .grid { grid-template-columns: 1fr; }
      .hero { font-size: 46px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="tabs">
      <button class="tab active" data-tab="employer">Employer</button>
      <button class="tab" data-tab="employee">Employee</button>
      <button class="tab" data-tab="log">On-Chain Log</button>
    </div>

    <section id="employer" class="panel active">
      <div class="grid">
        <div class="card stat-card"><div class="stat-title">Vault Balance</div><div id="vaultBal" class="stat-val" style="color:#00e5b4">250000.000000</div></div>
        <div class="card stat-card"><div class="stat-title">Streaming Rate</div><div id="rate" class="stat-val" style="color:#00e5b4">0.00002895</div></div>
        <div class="card stat-card"><div class="stat-title">Employees</div><div class="stat-val" style="color:white">3</div></div>
      </div>
      <div class="card table-wrap" style="margin-top:12px">
        <table>
          <thead><tr><th>Name</th><th>Currency</th><th>Claimable</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="empRows"></tbody>
        </table>
      </div>
    </section>

    <section id="employee" class="panel">
      <div class="employee-wrap">
        <div class="card">
          <div class="label">AVAILABLE TO WITHDRAW</div>
          <div id="counter" class="hero">0.000000</div>
          <div id="subtitle" class="sub">Earning 0.00000965 USDT/sec</div>
          <div class="fx">1 USDT → 7.82 HKD  ·  56.21 PHP  ·  83.44 INR</div>
          <button id="withdraw" class="btn-withdraw">Withdraw All</button>
          <div id="confirm" class="banner"></div>
        </div>
      </div>
    </section>

    <section id="log" class="panel">
      <div class="card table-wrap">
        <table>
          <thead><tr><th>Block</th><th>Type</th><th>Details</th><th>Tx Hash</th></tr></thead>
          <tbody id="logRows"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    const tabs = [...document.querySelectorAll('.tab')]
    tabs.forEach((tab) => {
      tab.onclick = () => {
        tabs.forEach((x) => x.classList.remove('active'))
        tab.classList.add('active')
        document.querySelectorAll('.panel').forEach((p) => p.classList.remove('active'))
        document.getElementById(tab.dataset.tab).classList.add('active')
      }
    })

    const rows = [
      { id: 0, name: 'Alice Reyes', ccy: 'PHP', claim: 1.247779, status: 'Active' },
      { id: 1, name: 'Budi Santoso', ccy: 'IDR', claim: 0.812143, status: 'Paused' },
      { id: 2, name: 'Priya Nair', ccy: 'INR', claim: 1.193522, status: 'Active' },
    ]

    const empRows = document.getElementById('empRows')
    function renderRows() {
      empRows.innerHTML = rows.map((r) => {
        const isActive = r.status === 'Active'
        const badge = isActive ? 'active' : 'paused'
        return `
          <tr>
            <td>${r.name}</td>
            <td>${r.ccy}</td>
            <td>
              <span class="claimable">
                ${isActive ? '<span class="pulse-dot"></span>' : ''}
                ${r.claim.toFixed(6)}
              </span>
            </td>
            <td><span class="badge ${badge}">${r.status}</span></td>
            <td>
              <button class="btn btn-pause">Pause</button>
              <button class="btn btn-cancel">Cancel</button>
            </td>
          </tr>
        `
      }).join('')
    }
    renderRows()

    let employerTick = 0
    setInterval(() => {
      employerTick += 0.00001
      rows.forEach((r) => {
        if (r.status === 'Active') r.claim += 0.00001
      })
      document.getElementById('vaultBal').textContent = (250000 + employerTick * 1000).toFixed(6)
      document.getElementById('rate').textContent = (0.00002895 + employerTick / 10).toFixed(8)
      renderRows()
    }, 250)

    const counter = document.getElementById('counter')
    const withdrawBtn = document.getElementById('withdraw')
    const confirm = document.getElementById('confirm')

    function getAlice() {
      return rows.find((r) => r.name === 'Alice Reyes')
    }

    function syncEmployeeCounter() {
      const alice = getAlice()
      counter.textContent = (alice ? alice.claim : 0).toFixed(6)
    }

    setInterval(syncEmployeeCounter, 250)

    withdrawBtn.onclick = () => {
      withdrawBtn.disabled = true
      withdrawBtn.innerHTML = '<span class="spinner"></span> Confirming...'

      setTimeout(() => {
        const alice = getAlice()
        if (alice) alice.claim = 0
        counter.textContent = '0.000000'
        counter.classList.add('flash')
        setTimeout(() => counter.classList.remove('flash'), 280)

        withdrawBtn.disabled = false
        withdrawBtn.textContent = 'Withdraw All'

        confirm.style.display = 'block'
        confirm.innerHTML = '✓ Withdrawal confirmed · 0x7f3a…bc91 · <a href="#">View on explorer →</a>'
        setTimeout(() => {
          confirm.style.display = 'none'
        }, 4000)
      }, 1500)
    }

    const logRows = document.getElementById('logRows')
    const logData = [
      { block: 4821044, type: 'StreamCreated', details: 'Stream #0 · Alice R. · 25,000 USDT/month', tx: '0x7f3a…bc91' },
      { block: 4821041, type: 'StreamCreated', details: 'Stream #1 · Budi S. · 18,000 USDT/month', tx: '0x2e1d…a847' },
      { block: 4821038, type: 'StreamCreated', details: 'Stream #2 · Priya N. · 14,000 USDT/month', tx: '0x9c4f…3310' },
      { block: 4821035, type: 'PAUSED', details: 'Stream #1 · Budi S.', tx: '0x4b8e…7729' },
    ]

    function typeClass(type) {
      const k = type.toLowerCase()
      if (k === 'streamcreated') return 'type-streamcreated'
      if (k === 'withdrawn') return 'type-withdrawn'
      if (k === 'paused') return 'type-paused'
      if (k === 'topup') return 'type-topup'
      if (k === 'cancelled') return 'type-cancelled'
      return ''
    }

    function renderLog() {
      logRows.innerHTML = logData.map((item) => `
        <tr class="log-row">
          <td class="mono">${item.block.toLocaleString()}</td>
          <td class="mono ${typeClass(item.type)}">${item.type}</td>
          <td>${item.details}</td>
          <td class="mono">${item.tx}</td>
        </tr>
      `).join('')
    }
    renderLog()

    function randHex(len) {
      let out = ''
      const alphabet = '0123456789abcdef'
      for (let i = 0; i < len; i += 1) out += alphabet[Math.floor(Math.random() * alphabet.length)]
      return out
    }

    setInterval(() => {
      const topBlock = logData[0]?.block ?? 4821044
      const nextBlock = topBlock + (Math.floor(Math.random() * 3) + 2)
      const isWithdraw = Math.random() > 0.5
      const amount = (Math.random() * 3 + 0.4).toFixed(2)

      logData.unshift({
        block: nextBlock,
        type: isWithdraw ? 'WITHDRAWN' : 'TOPUP',
        details: isWithdraw ? `Alice R. · ${amount} USDT` : 'Employer added 5,000 USDT',
        tx: `0x${randHex(4)}…${randHex(4)}`,
      })

      renderLog()
    }, 8000)
  </script>
</body>
</html>
